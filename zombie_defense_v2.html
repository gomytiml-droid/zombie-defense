<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ゾンビ防衛</title>
  <link rel="stylesheet" href="zombie_defense_v2.css">
</head>
<body>
<div id="outer-wrap">
  <div id="wrap">
    <div id="hud">
      <div class="hud-b"><div class="hud-l">WAVE</div><div class="hud-v" id="hWave">1</div></div>
      <div class="hud-b"><div class="hud-l">HP</div><div class="hud-v" id="hHp" style="color:#e24b4a">100</div></div>
      <div class="hud-b"><div class="hud-l">SCORE</div><div class="hud-v" id="hScore">0</div></div>
      <div class="hud-b"><div class="hud-l">KILLS</div><div class="hud-v" id="hKills">0</div></div>
      <div class="hud-b"><div class="hud-l">MONEY</div><div class="hud-v" id="hMoney" style="color:#EF9F27">$0</div></div>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="overlay">
        <div class="ov-title" id="ovTitle">GAME OVER</div>
        <div class="ov-sub" id="ovSub"></div>
        <button class="ov-btn" onclick="startGame()">もう一度</button>
      </div>
    </div>
    <div id="bottom">
      <div id="weapon-bar">
        <div class="wbtn active" onclick="setWeapon(0)" id="w0">ピストル<br><span style="font-size:9px">連射/低</span></div>
        <div class="wbtn" onclick="setWeapon(1)" id="w1">ショットガン<br><span style="font-size:9px">広/遅</span></div>
        <div class="wbtn" onclick="setWeapon(2)" id="w2">マシンガン<br><span style="font-size:9px">連射/中</span></div>
      </div>
      <div id="action-bar">
        <div class="abtn" id="repairBtn">窓修理<br><span style="font-size:9px">窓に近づくと自動</span></div>
        <div class="abtn" onclick="openShop()" style="border-color:#EF9F27;color:#EF9F27;">ショップ<br><span style="font-size:9px">アップグレード</span></div>
      </div>
      <div id="controls">
        <div id="stick-pad"><div id="stick-knob"></div></div>
        <div style="font-size:10px;color:#444;text-align:right">移動: スティック / WASD<br>窓に近づくと自動修理 ($20)</div>
      </div>
    </div>
  </div>

  <!-- Shop panel: to the right of the game -->
  <div id="shop-panel">
    <div class="shop-title">ショップ</div>
    <div id="shop-items"></div>
    <button class="ov-btn" style="margin-top:8px;width:100%" onclick="closeShop()">閉じる</button>
  </div>
</div>
<script src="zombie_defense_v2.js"></script>
</body>
</html>
