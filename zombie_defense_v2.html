<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ゾンビ防衛</title>
  <link rel="stylesheet" href="zombie_defense_v2.css">
</head>
<body>
<div id="outer-wrap">
  <div id="wrap">
    <div id="hud">
      <div class="hud-b"><div class="hud-l">WAVE</div><div class="hud-v" id="hWave">1</div></div>
      <div class="hud-b"><div class="hud-l">HP</div><div class="hud-v" id="hHp" style="color:#e24b4a">100</div></div>
      <div class="hud-b"><div class="hud-l">SCORE</div><div class="hud-v" id="hScore">0</div></div>
      <div class="hud-b"><div class="hud-l">KILLS</div><div class="hud-v" id="hKills">0</div></div>
      <div class="hud-b"><div class="hud-l">MONEY</div><div class="hud-v" id="hMoney" style="color:#EF9F27">$0</div></div>
      <div class="hud-b"><div class="hud-l">KEY</div><div class="hud-v" id="hKey" style="color:#EF9F27">0</div></div>
      <div class="hud-b"><!-- [TASK-07] -->
  <div class="hud-l">BEST</div>
  <div class="hud-v" id="hBest" style="color:#EF9F27">0</div>
</div>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="overlay">
        <div class="ov-title" id="ovTitle">GAME OVER</div>
        <div class="ov-sub" id="ovSub"></div>
        <button class="ov-btn" onclick="startGame()">もう一度</button>
      </div>
    </div>
    <div id="bottom">
      <!-- アイテムスロット（メイン・サブ） -->
      <div id="item-slots">
        <div class="item-slot active-slot" id="item-slot-0">ハンドガン</div>
        <div class="swap-btn" onclick="swapSlots()">⇆ SWAP<br><span style="font-size:8px">Tab / Q</span></div>
        <div class="item-slot" id="item-slot-1">---</div>
      </div>
      <div id="action-bar">
        <div class="abtn" id="repairBtn">窓修理<br><span style="font-size:9px">窓に近づくと自動</span></div>
        <div class="abtn phys-btn" id="physBtn" onclick="doPhysicalAttack()">👊<br><span style="font-size:9px">物理攻撃</span></div><!-- [TASK-15c] -->
        <div class="abtn" id="doorBtn" onclick="tryToggleDoor()">🔑ドア<br><span style="font-size:9px">開 / 閉</span></div><!-- [TASK-13b] -->
        <!-- [TASK-14c] NPC操作ボタン -->
        <div class="abtn" id="npcWeaponBtn" onclick="giveWeaponToNPC()">🔫渡す<br><span style="font-size:9px">NPC武器</span></div>
        <div class="abtn" id="npcFollowBtn" onclick="commandNPC('follow')">🚶<br><span style="font-size:9px">ついてこい</span></div>
        <div class="abtn" id="npcStandbyBtn" onclick="commandNPC('standby')">✋<br><span style="font-size:9px">待機</span></div>
        <div class="abtn" onclick="openShop()" style="border-color:#EF9F27;color:#EF9F27;">ショップ<br><span style="font-size:9px">アップグレード</span></div>
      </div>
      <div id="controls"><!-- [TASK-11] フローティングスティック化 -->
        <div style="font-size:10px;color:#333;text-align:center;width:100%">
          画面をスライドして移動 / WASD
        </div>
      </div>
    </div>
  </div>
</div><!-- /#outer-wrap ここで閉じる -->

<!-- [TASK-10] ショップをfixedオーバーレイに変更 -->
<div id="shop-panel">
  <div class="shop-header">
    <div class="shop-title">ショップ</div>
    <button class="shop-close-btn" onclick="closeShop()">✕</button>
  </div>
  <div id="shop-items"></div>
</div>

<script src="js/weapons.js"></script>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/walls.js"></script>
<script src="js/entities.js"></script>
<script src="js/render.js"></script>
<script src="js/shop.js"></script>
<script src="js/items.js"></script>
<script src="js/npc.js"></script>
<script src="js/input.js"></script>
<script src="js/game.js"></script>
</body>
</html>
